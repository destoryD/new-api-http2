name: Build Docker image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag, for example test or v1.0.0"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_single_arch:
    name: Build and push Docker image (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Prepare image tags
        id: tags
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::12}"

          sanitize_tag() {
            echo "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//' \
              | cut -c1-128
          }

          tags=(
            "${image_name}:latest-${{ matrix.arch }}"
            "${image_name}:main-${{ matrix.arch }}"
            "${image_name}:sha-${short_sha}-${{ matrix.arch }}"
          )

          if [ -n "${INPUT_TAG:-}" ]; then
            extra_tag="$(sanitize_tag "$INPUT_TAG")"
            if [ -n "$extra_tag" ]; then
              tags+=("${image_name}:${extra_tag}-${{ matrix.arch }}")
            fi
          fi

          {
            echo "image_name=${image_name}"
            echo "short_sha=${short_sha}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.tags.outputs.image_name }}

      - name: Build and push single-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-ghcr-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-ghcr-${{ matrix.arch }}
          provenance: mode=max
          sbom: true

      - name: Image summary
        run: |
          echo "### Published ${{ matrix.arch }} image tags" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  create_manifests:
    name: Create multi-arch manifests
    needs:
      - build_single_arch
    runs-on: ubuntu-latest

    steps:
      - name: Prepare manifest tags
        id: tags
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::12}"

          sanitize_tag() {
            echo "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//' \
              | cut -c1-128
          }

          tags=(
            "${image_name}:latest"
            "${image_name}:main"
            "${image_name}:sha-${short_sha}"
          )

          if [ -n "${INPUT_TAG:-}" ]; then
            extra_tag="$(sanitize_tag "$INPUT_TAG")"
            if [ -n "$extra_tag" ]; then
              tags+=("${image_name}:${extra_tag}")
            fi
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi
            docker buildx imagetools create \
              -t "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done <<'EOF'
          ${{ steps.tags.outputs.tags }}
          EOF

      - name: Manifest summary
        run: |
          echo "### Published multi-arch image tags" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
